<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Position Map – Hydravision</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --theme-bg: #0a0e14;
      --theme-map-bg: #1a2332;
      --theme-panel: #0a101a;
      --theme-surface: #141c2c;
      --theme-border: #4078dc;
      --theme-text: #e8f0ff;
      --theme-muted: #6b8cbe;
      --theme-accent: #9bd85a;
      --theme-panel-rgb: 10,16,26;
      --theme-surface-rgb: 20,28,44;
      --theme-border-rgb: 64,120,220;
    }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; font-family: "DJI Droid Sans", "SF Pro Display", system-ui, -apple-system, sans-serif; background: var(--theme-bg); color: var(--theme-text); }
    .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
    /* Top bar: DJI-style dark strip with key inputs */
    .topbar { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: rgba(var(--theme-panel-rgb), 0.92); border-bottom: 1px solid rgba(var(--theme-border-rgb), 0.35); flex-wrap: wrap; }
    .topbar-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--theme-muted); }
    .topbar input { width: 100px; padding: 6px 8px; border-radius: 6px; border: 1px solid rgba(var(--theme-border-rgb), 0.5); background: rgba(var(--theme-surface-rgb), 0.9); color: var(--theme-text); font-size: 13px; font-variant-numeric: tabular-nums; }
    .topbar input::placeholder { color: var(--theme-muted); opacity: 0.78; }
    .topbar button { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(var(--theme-border-rgb), 0.6); background: rgba(var(--theme-border-rgb), 0.35); color: var(--theme-text); font-weight: 600; font-size: 13px; cursor: pointer; }
    .topbar button:active { background: rgba(var(--theme-border-rgb), 0.48); }
    .topbar .sep { width: 1px; height: 20px; background: rgba(var(--theme-border-rgb), 0.3); }
    #map { width: 100%; height: 100%; background: var(--theme-map-bg); }
    .leaflet-control-zoom a {
      background: rgba(8, 12, 18, 0.9) !important;
      border-color: rgba(58, 74, 98, 0.9) !important;
      color: var(--theme-muted) !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(14, 20, 30, 0.95) !important;
      color: var(--theme-text) !important;
    }
    body.minimal .leaflet-top.leaflet-left {
      left: 12px;
      right: auto;
      top: 12px;
      transform: none;
    }
    body.minimal .leaflet-top.leaflet-left .leaflet-control-zoom {
      margin-top: 0 !important;
      margin-left: 0 !important;
    }
    body.minimal .leaflet-top.leaflet-right .leaflet-control-attribution {
      margin-top: 42px !important;
      margin-right: 0 !important;
    }
    body.minimal .leaflet-bottom.leaflet-right .leaflet-control-scale {
      margin-bottom: 14px !important;
      margin-right: 12px !important;
    }
    .leaflet-control-attribution {
      background: rgba(8, 12, 18, 0.86) !important;
      color: var(--theme-muted) !important;
      border-top: 1px solid rgba(58, 74, 98, 0.55);
      border-left: 1px solid rgba(58, 74, 98, 0.55);
      border-top-left-radius: 6px;
      padding: 2px 6px !important;
      font-size: 10px;
      opacity: 0.92;
    }
    .leaflet-control-attribution a {
      color: var(--theme-text) !important;
    }
    .leaflet-control-scale-line {
      border-color: rgba(var(--theme-border-rgb), 0.85) !important;
      color: var(--theme-text) !important;
      background: rgba(8, 12, 18, 0.86) !important;
      text-shadow: none !important;
      font-weight: 600;
    }
    /* Overlay panels: DJI-style rounded dark glass */
    .overlay-panel { position: absolute; z-index: 1000; background: rgba(var(--theme-panel-rgb), 0.88); border: 1px solid rgba(var(--theme-border-rgb), 0.25); border-radius: 10px; padding: 10px 12px; backdrop-filter: blur(8px); }
    .overlay-panel h3 { margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--theme-muted); font-weight: 600; }
    .position-readouts { bottom: 12px; left: 12px; max-width: min(220px, 28vw); font-variant-numeric: tabular-nums; padding: 6px 10px; }
    .position-readouts h3 { margin: 0 0 4px 0; font-size: 9px; }
    .position-readouts .readout-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
    .position-readouts .label { font-size: 10px; color: var(--theme-muted); }
    .position-readouts .value { font-size: 12px; font-weight: 600; color: var(--theme-text); min-width: 2.5em; text-align: right; }
    .compass-wrap { top: 12px; right: 12px; width: 72px; height: 72px; }
    .compass-ring { width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(var(--theme-border-rgb), 0.4); background: rgba(var(--theme-panel-rgb), 0.75); position: relative; display: flex; align-items: center; justify-content: center; }
    .compass-north { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--theme-muted); font-weight: 700; }
    .compass-needle { width: 4px; height: 28px; background: linear-gradient(to top, var(--theme-border) 0%, transparent 100%); border-radius: 2px; transform-origin: center 14px; box-shadow: 0 0 12px rgba(var(--theme-border-rgb), 0.5); }
    .tilt-roll-wrap {
      left: 12px;
      bottom: 12px;
      width: 64px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border-color: transparent;
      backdrop-filter: none;
    }
    body.minimal .tilt-roll-wrap {
      left: auto;
      right: 12px;
      top: 50%;
      bottom: auto;
      transform: translateY(-50%);
      width: 84px;
      height: 234px;
    }
    body.minimal .tilt-roll-wrap .tilt-roll-svg {
      width: 58px;
      height: 203px;
    }
    .tilt-roll-svg { width: 44px; height: 156px; }
    .tilt-roll-rail { stroke: rgba(155,216,90,0.8); stroke: var(--theme-accent); stroke-width: 1.4; }
    .tilt-roll-tick { stroke: var(--theme-accent); stroke-opacity: 0.62; stroke-width: 1.1; }
    .tilt-roll-indicator { stroke: var(--theme-accent); stroke-width: 2.1; stroke-linecap: round; }
    .head-marker { background: none !important; border: none !important; }
    .head-marker div { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }

    /* Pictorial axes: fire-control / cinema / DJI / helicopter style */
    .axes-panel { bottom: 16px; right: 16px; width: 280px; }
    .axes-panel h3 { margin-bottom: 6px; }
    .axes-instruments { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
    .axis-widget { background: rgba(var(--theme-panel-rgb), 0.52); border: 1px solid rgba(var(--theme-border-rgb), 0.3); border-radius: 6px; padding: 6px; position: relative; }
    .axis-widget .axis-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--theme-muted); text-align: center; margin-bottom: 2px; }
    .axis-widget svg { display: block; width: 100%; height: auto; }
    .axis-widget .axis-value { font-size: 10px; color: var(--theme-muted); text-align: center; font-variant-numeric: tabular-nums; margin-top: 2px; }
    .axis-widget.pan-tilt { grid-column: 1 / -1; }
    .axis-widget.pan-tilt .combined-svg { display: flex; justify-content: center; gap: 8px; align-items: center; }
    .axis-widget.pan-tilt .combined-svg svg { flex: 0 0 auto; }

    /* Sim mode: drive instruments from fast axes (sliders or decoded UDP packet) */
    .sim-panel { top: 60px; left: 16px; width: 200px; display: none; }
    .sim-panel.visible { display: block; }
    .sim-panel .axis-row { display: grid; grid-template-columns: 42px 1fr 48px; gap: 6px; align-items: center; margin-bottom: 6px; }
    .sim-panel .axis-row label { font-size: 10px; color: var(--theme-muted); font-variant-numeric: tabular-nums; }
    .sim-panel input[type="range"] { width: 100%; height: 6px; -webkit-appearance: none; appearance: none; background: rgba(var(--theme-border-rgb), 0.25); border-radius: 3px; }
    .sim-panel input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--theme-border); border: 1px solid var(--theme-text); cursor: pointer; }
    .sim-panel input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--theme-border); border: 1px solid var(--theme-text); cursor: pointer; }
    .sim-panel .packet-row { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(var(--theme-border-rgb), 0.25); }
    .sim-panel .packet-row input { width: 100%; font-size: 10px; font-family: ui-monospace, monospace; }
    .sim-panel .packet-row button { margin-top: 4px; font-size: 11px; padding: 4px 8px; }
    .tile-status {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 10px;
      font-size: 11px;
      color: #ffd9a3;
      border-color: rgba(197,154,58,.55);
      background: rgba(42, 32, 18, 0.86);
      display: none;
      pointer-events: none;
    }
    .tile-status.show { display: block; }
    .map-style-toggle {
      height: 30px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid rgba(var(--theme-border-rgb), 0.55);
      background: rgba(var(--theme-surface-rgb), 0.92);
      color: var(--theme-text);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
    }
    .map-style-toggle:active {
      filter: brightness(0.95);
    }
    body.minimal .app { grid-template-rows: 1fr; }
    body.minimal .leaflet-control-attribution {
      font-size: 8px !important;
      padding: 1px 4px !important;
      opacity: 0.85;
    }
    body.minimal .topbar,
    body.minimal .sim-panel,
    body.minimal .position-readouts,
    body.minimal .axes-panel,
    body.minimal .compass-wrap { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="topbar-label">Paste lat, long</div>
        <input type="text" id="pasteLatLon" placeholder="50.564782, -2.449499" style="width:220px;" />
      </div>
      <div>
        <div class="topbar-label">Latitude</div>
        <input type="text" id="lat" placeholder="lat" value="50.56478249783015" />
      </div>
      <div>
        <div class="topbar-label">Longitude</div>
        <input type="text" id="lon" placeholder="lon" value="-2.449499288081317" />
      </div>
      <div>
        <div class="topbar-label">Heading °</div>
        <input type="number" id="heading" min="0" max="359" step="1" placeholder="0–359" value="45" />
      </div>
      <div class="sep"></div>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;" title="Show sliders and live controller link to drive map from axes">
        <input type="checkbox" id="simMode" />
        <span class="topbar-label" style="margin:0;">Sim mode</span>
      </label>
      <button type="button" id="mapStyleToggle" class="map-style-toggle">Map: Color</button>
      <span class="topbar-label" style="font-size:9px;color:#5a6d8a;max-width:140px;">(check to show sliders)</span>
      <div style="align-self: flex-end;">
        <button type="button" id="apply">Apply</button>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <div class="overlay-panel sim-panel" id="simPanel">
    <h3>Sim — fast axes → ±180°</h3>
    <div class="packet-row" style="margin-top:0;padding-top:0;border-top:0;">
      <div class="topbar-label">Live from controller (Pi)</div>
      <input type="text" id="wsUrl" placeholder="ws://localhost:8766 or ws://&lt;pi-ip&gt;:8766" style="font-size:11px;" />
      <button type="button" id="wsConnect">Connect</button>
      <span id="wsStatus" style="font-size:10px;color:#5a6d8a;"></span>
    </div>
    <div class="axis-row"><label id="lblPan">Pan</label><input type="range" id="simPan" min="-180" max="180" value="45" step="1" /><label id="valSimPan">45°</label></div>
    <div class="axis-row"><label id="lblTilt">Tilt</label><input type="range" id="simTilt" min="-180" max="180" value="0" step="1" /><label id="valSimTilt">0°</label></div>
    <div class="axis-row"><label id="lblRoll">Roll</label><input type="range" id="simRoll" min="-180" max="180" value="0" step="1" /><label id="valSimRoll">0°</label></div>
    <div class="axis-row"><label>Zoom</label><input type="range" id="simZoom" min="-180" max="180" value="0" step="1" /><label id="valSimZoom">0°</label></div>
    <div class="axis-row"><label>Focus</label><input type="range" id="simFocus" min="0" max="100" value="50" step="1" /><label id="valSimFocus">50%</label></div>
    <div class="packet-row">
      <div class="topbar-label">Fast packet (19-byte hex)</div>
      <input type="text" id="fastPacketHex" placeholder="dead10..." maxlength="38" />
      <button type="button" id="decodePacket">Decode</button>
    </div>
  </div>

  <div class="overlay-panel position-readouts">
    <h3>Position <span style="font-weight:400;color:#5a6d8a;font-size:10px;">(head telemetry when connected)</span></h3>
    <div class="readout-row"><span class="label">Pan</span><span class="value" id="valPan">—</span></div>
    <div class="readout-row"><span class="label">Tilt</span><span class="value" id="valTilt">—</span></div>
    <div class="readout-row"><span class="label">Roll</span><span class="value" id="valRoll">—</span></div>
    <div class="readout-row"><span class="label">Zoom</span><span class="value" id="valZoom">—</span></div>
    <div class="readout-row"><span class="label">Focus</span><span class="value" id="valFocus">—</span></div>
  </div>

  <div class="overlay-panel compass-wrap">
    <div class="compass-ring">
      <span class="compass-north">N</span>
      <div class="compass-needle" id="compassNeedle"></div>
    </div>
  </div>

  <div class="overlay-panel tilt-roll-wrap">
    <svg class="tilt-roll-svg" viewBox="0 0 44 156" xmlns="http://www.w3.org/2000/svg" aria-label="Tilt roll indicator">
      <line class="tilt-roll-rail" x1="22" y1="12" x2="22" y2="144"/>
      <line class="tilt-roll-tick" x1="17" y1="12" x2="27" y2="12"/>
      <line class="tilt-roll-tick" x1="17" y1="45" x2="27" y2="45"/>
      <line class="tilt-roll-tick" x1="17" y1="78" x2="27" y2="78"/>
      <line class="tilt-roll-tick" x1="17" y1="111" x2="27" y2="111"/>
      <line class="tilt-roll-tick" x1="17" y1="144" x2="27" y2="144"/>
      <line id="tiltRollIndicator" class="tilt-roll-indicator" x1="8" y1="78" x2="36" y2="78"/>
    </svg>
  </div>

  <div class="overlay-panel axes-panel">
    <h3>Axes</h3>
    <div class="axes-instruments">
      <div class="axis-widget pan-tilt">
        <div class="axis-title">Azimuth / Elevation</div>
        <div class="combined-svg">
          <svg id="axisPan" width="80" height="48" viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="none" stroke="rgba(64,120,220,0.4)" stroke-width="1.5" d="M 8 40 A 36 36 0 0 1 72 40"/>
            <line x1="40" y1="40" x2="40" y2="24" stroke="rgba(64,120,220,0.5)" stroke-width="0.5"/>
            <text x="12" y="44" font-size="6" fill="#5a6d8a">0</text>
            <text x="38" y="44" font-size="6" fill="#5a6d8a">180</text>
            <text x="68" y="44" font-size="6" fill="#5a6d8a">360</text>
            <line id="panNeedle" x1="40" y1="40" x2="40" y2="12" stroke="#4080ff" stroke-width="2" stroke-linecap="round" transform="rotate(0 40 40)"/>
          </svg>
          <svg id="axisTilt" width="56" height="48" viewBox="0 0 56 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="none" stroke="rgba(64,120,220,0.4)" stroke-width="1.5" d="M 28 4 A 24 24 0 0 1 28 44"/>
            <line x1="28" y1="24" x2="52" y2="24" stroke="rgba(64,120,220,0.5)" stroke-width="0.5"/>
            <text x="2" y="18" font-size="5" fill="#5a6d8a">+90</text>
            <text x="2" y="26" font-size="5" fill="#5a6d8a">0</text>
            <text x="2" y="44" font-size="5" fill="#5a6d8a">-90</text>
            <line id="tiltNeedle" x1="28" y1="24" x2="28" y2="24" stroke="#4080ff" stroke-width="2" stroke-linecap="round" transform="rotate(0 28 24)"/>
          </svg>
        </div>
        <div class="axis-value" id="axisPanTiltVal">— / —</div>
      </div>
      <div class="axis-widget">
        <div class="axis-title">Roll</div>
        <svg id="axisRoll" width="100%" height="44" viewBox="0 0 60 44" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <circle cx="30" cy="22" r="18" fill="none" stroke="rgba(64,120,220,0.4)" stroke-width="1.5"/>
          <line x1="30" y1="4" x2="30" y2="40" stroke="rgba(64,120,220,0.3)" stroke-width="0.5"/>
          <line x1="12" y1="22" x2="48" y2="22" stroke="rgba(64,120,220,0.3)" stroke-width="0.5"/>
          <line id="rollNeedle" x1="30" y1="22" x2="30" y2="6" stroke="#4080ff" stroke-width="2" stroke-linecap="round" transform="rotate(0 30 22)"/>
          <circle cx="30" cy="22" r="3" fill="#0a0e14" stroke="#4080ff"/>
        </svg>
        <div class="axis-value" id="axisRollVal">—</div>
      </div>
      <div class="axis-widget">
        <div class="axis-title">Zoom</div>
        <svg id="axisZoom" width="100%" height="32" viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <rect x="8" y="12" width="104" height="8" rx="2" fill="rgba(20,28,44,0.9)" stroke="rgba(64,120,220,0.4)" stroke-width="1"/>
          <rect id="zoomFill" x="8" y="12" width="0" height="8" rx="2" fill="rgba(64,128,255,0.6)"/>
          <text x="4" y="22" font-size="7" fill="#5a6d8a">W</text>
          <text x="112" y="22" font-size="7" fill="#5a6d8a">T</text>
        </svg>
        <div class="axis-value" id="axisZoomVal">—</div>
      </div>
      <div class="axis-widget">
        <div class="axis-title">Focus</div>
        <svg id="axisFocus" width="100%" height="32" viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <rect x="8" y="12" width="104" height="8" rx="2" fill="rgba(20,28,44,0.9)" stroke="rgba(64,120,220,0.4)" stroke-width="1"/>
          <rect id="focusFill" x="8" y="12" width="0" height="8" rx="2" fill="rgba(64,200,160,0.6)"/>
          <text x="2" y="22" font-size="7" fill="#5a6d8a">∞</text>
          <text x="108" y="22" font-size="7" fill="#5a6d8a">M</text>
        </svg>
        <div class="axis-value" id="axisFocusVal">—</div>
      </div>
    </div>
  </div>
  <div id="tileStatus" class="overlay-panel tile-status">Loading map tiles...</div>

  <script>
    (function () {
      const latInput = document.getElementById("lat");
      const lonInput = document.getElementById("lon");
      const headingInput = document.getElementById("heading");
      const applyBtn = document.getElementById("apply");
      const compassNeedle = document.getElementById("compassNeedle");
      const qs = new URLSearchParams(window.location.search || "");
      const minimalMode = qs.get("minimal") === "1";
      const qLat = Number(qs.get("lat"));
      const qLon = Number(qs.get("lon"));
      const qHeading = Number(qs.get("heading"));
      const defaultLat = Number.isFinite(qLat) ? qLat : 50.56478249783015;
      const defaultLon = Number.isFinite(qLon) ? qLon : -2.449499288081317;
      const defaultHeading = Number.isFinite(qHeading) ? ((qHeading % 360) + 360) % 360 : 45;
      if (minimalMode) document.body.classList.add("minimal");

      let map;
      let headMarker = null;
      let headingLeftRay = null;
      let headingRightRay = null;
      let headingFovFill = null;
      let indicatorZoomRatio = null;
      let latestTiltDeg = 0;
      let latestRollDeg = 0;
      let tileLayer = null;
      let tileProviderIndex = 0;
      const TILE_STYLE_STORAGE_KEY = "position_map_tile_style_v1";
      const TILE_STYLE_ORDER = ["color", "mono", "dark"];
      const tileStyles = {
        color: [
          { url: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", attribution: "&copy; OSM, &copy; CARTO" },
          { url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", attribution: "&copy; OSM, &copy; CARTO" },
        ],
        mono: [
          { url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", attribution: "&copy; OSM, &copy; CARTO" },
          { url: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", attribution: "&copy; OSM, &copy; CARTO" },
        ],
        dark: [
          { url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", attribution: "&copy; OSM, &copy; CARTO" },
          { url: "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png", attribution: "&copy; OSM, &copy; CARTO" },
        ],
      };
      const osmFallbackProviders = [
        // Keep OSM endpoints as final fallback. Some environments block file:// origins by referer policy.
        { url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png", attribution: "&copy; OSM contributors" },
        { url: "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png", attribution: "&copy; OSM contributors" },
        { url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", attribution: "&copy; OSM contributors" },
      ];
      let tileStyle = "dark";
      let providers = [];
      const indicatorColor = "#9bd85a";
      const INDICATOR_DIAMETER_PX = 12;
      const INDICATOR_RADIUS_PX = INDICATOR_DIAMETER_PX / 2;
      const ARROW_ZOOM_MIN = 14;
      const ARROW_ZOOM_MAX = 19;
      const H_FOV_MIN_DEG = 5;
      const H_FOV_MAX_DEG = 64;

      function parseNum(id, def) {
        const v = parseFloat(document.getElementById(id).value);
        return Number.isFinite(v) ? v : def;
      }

      function getLat() { return parseNum("lat", defaultLat); }
      function getLon() { return parseNum("lon", defaultLon); }
      function getHeading() {
        const v = parseInt(document.getElementById("heading").value, 10);
        return Number.isFinite(v) ? ((v % 360) + 360) % 360 : defaultHeading;
      }

      function updateReadouts(pan, tilt, roll, zoom, focus) {
        document.getElementById("valPan").textContent = pan != null ? String(pan) : "—";
        document.getElementById("valTilt").textContent = tilt != null ? String(tilt) : "—";
        document.getElementById("valRoll").textContent = roll != null ? String(roll) : "—";
        document.getElementById("valZoom").textContent = zoom != null ? String(zoom) : "—";
        document.getElementById("valFocus").textContent = focus != null ? String(focus) : "—";
      }

      function updateCompass(deg) {
        if (compassNeedle) compassNeedle.style.transform = "rotate(" + deg + "deg)";
      }

      function setTileStatus(msg, show) {
        var el = document.getElementById("tileStatus");
        if (!el) return;
        if (msg != null) el.textContent = String(msg);
        el.classList.toggle("show", !!show);
      }

      function updateAxisInstruments(pan, tilt, roll, zoomNorm, focusNorm) {
        const panDeg = Number.isFinite(pan) ? pan : 0;
        const tiltDeg = Number.isFinite(tilt) ? tilt : 0;
        const rollDeg = Number.isFinite(roll) ? roll : 0;
        const zoom = Number.isFinite(zoomNorm) ? Math.max(0, Math.min(100, zoomNorm)) : 0;
        const focus = Number.isFinite(focusNorm) ? Math.max(0, Math.min(100, focusNorm)) : 0;

        const panNeedle = document.getElementById("panNeedle");
        const tiltNeedle = document.getElementById("tiltNeedle");
        const rollNeedle = document.getElementById("rollNeedle");
        const zoomFill = document.getElementById("zoomFill");
        const focusFill = document.getElementById("focusFill");

        if (panNeedle) panNeedle.setAttribute("transform", "rotate(" + panDeg + " 40 40)");
        if (tiltNeedle) {
          const len = 20;
          const tr = (tiltDeg * Math.PI) / 180;
          const ex = 28 + len * Math.cos(tr);
          const ey = 24 - len * Math.sin(tr);
          tiltNeedle.setAttribute("x2", ex);
          tiltNeedle.setAttribute("y2", ey);
          tiltNeedle.setAttribute("x1", 28);
          tiltNeedle.setAttribute("y1", 24);
        }
        if (rollNeedle) rollNeedle.setAttribute("transform", "rotate(" + rollDeg + " 30 22)");
        if (zoomFill) zoomFill.setAttribute("width", (104 * zoom / 100));
        if (focusFill) focusFill.setAttribute("width", (104 * focus / 100));

        document.getElementById("axisPanTiltVal").textContent = (Number.isFinite(pan) ? Math.round(pan) + "°" : "—") + " / " + (Number.isFinite(tilt) ? Math.round(tilt) + "°" : "—");
        document.getElementById("axisRollVal").textContent = Number.isFinite(roll) ? Math.round(roll) + "°" : "—";
        document.getElementById("axisZoomVal").textContent = Number.isFinite(zoomNorm) ? Math.round(zoom) + "%" : "—";
        document.getElementById("axisFocusVal").textContent = Number.isFinite(focusNorm) ? Math.round(focus) + "%" : "—";
      }

      function updateTiltRollIndicator(tiltDeg, rollDeg) {
        const line = document.getElementById("tiltRollIndicator");
        if (!line) return;
        const railTop = 12;
        const railBottom = 144;
        const railCenterX = 22;
        const baseHalfLen = 14;
        const t = Math.max(-180, Math.min(180, Number(tiltDeg) || 0));
        const r = Math.max(-180, Math.min(180, Number(rollDeg) || 0));
        const yNorm = (t + 180) / 360;
        const y = railTop + ((1 - yNorm) * (railBottom - railTop));
        const rr = (r * Math.PI) / 180;
        const dx = Math.cos(rr) * baseHalfLen;
        const dy = Math.sin(rr) * baseHalfLen;
        line.setAttribute("x1", String(railCenterX - dx));
        line.setAttribute("y1", String(y - dy));
        line.setAttribute("x2", String(railCenterX + dx));
        line.setAttribute("y2", String(y + dy));
      }

      function metersPerPixelAtLatZoom(latDeg, zoom) {
        const latRad = (latDeg * Math.PI) / 180;
        return (156543.03392 * Math.cos(latRad)) / Math.pow(2, zoom);
      }

      function getZoomRatio() {
        if (Number.isFinite(indicatorZoomRatio)) return Math.max(0, Math.min(1, indicatorZoomRatio));
        const z = map ? Number(map.getZoom()) : ARROW_ZOOM_MIN;
        return Math.max(0, Math.min(1, (z - ARROW_ZOOM_MIN) / (ARROW_ZOOM_MAX - ARROW_ZOOM_MIN)));
      }

      function getRayEdgeHit(origin, headingDeg, size) {
        const r = (headingDeg * Math.PI) / 180;
        const dx = Math.sin(r);
        const dy = -Math.cos(r);
        const eps = 1e-6;
        const hits = [];
        if (Math.abs(dx) > eps) {
          const tLeft = (0 - origin.x) / dx;
          const yLeft = origin.y + (dy * tLeft);
          if (tLeft > 0 && yLeft >= -0.5 && yLeft <= size.y + 0.5) hits.push({ t: tLeft, edge: "left", x: 0, y: Math.max(0, Math.min(size.y, yLeft)) });
          const tRight = (size.x - origin.x) / dx;
          const yRight = origin.y + (dy * tRight);
          if (tRight > 0 && yRight >= -0.5 && yRight <= size.y + 0.5) hits.push({ t: tRight, edge: "right", x: size.x, y: Math.max(0, Math.min(size.y, yRight)) });
        }
        if (Math.abs(dy) > eps) {
          const tTop = (0 - origin.y) / dy;
          const xTop = origin.x + (dx * tTop);
          if (tTop > 0 && xTop >= -0.5 && xTop <= size.x + 0.5) hits.push({ t: tTop, edge: "top", x: Math.max(0, Math.min(size.x, xTop)), y: 0 });
          const tBottom = (size.y - origin.y) / dy;
          const xBottom = origin.x + (dx * tBottom);
          if (tBottom > 0 && xBottom >= -0.5 && xBottom <= size.x + 0.5) hits.push({ t: tBottom, edge: "bottom", x: Math.max(0, Math.min(size.x, xBottom)), y: size.y });
        }
        if (!hits.length) {
          return {
            edge: "top",
            point: { x: origin.x, y: 0 },
          };
        }
        hits.sort((a, b) => a.t - b.t);
        const hit = hits[0];
        return {
          edge: hit.edge,
          point: { x: hit.x, y: hit.y },
        };
      }

      function getHorizontalFovDeg() {
        const r = getZoomRatio();
        return H_FOV_MAX_DEG - ((H_FOV_MAX_DEG - H_FOV_MIN_DEG) * r);
      }

      function nextEdge(edge, clockwise) {
        if (clockwise) {
          if (edge === "top") return "right";
          if (edge === "right") return "bottom";
          if (edge === "bottom") return "left";
          return "top";
        }
        if (edge === "top") return "left";
        if (edge === "left") return "bottom";
        if (edge === "bottom") return "right";
        return "top";
      }

      function cornerAfter(edge, clockwise, size) {
        if (clockwise) {
          if (edge === "top") return { x: size.x, y: 0 };
          if (edge === "right") return { x: size.x, y: size.y };
          if (edge === "bottom") return { x: 0, y: size.y };
          return { x: 0, y: 0 };
        }
        if (edge === "top") return { x: 0, y: 0 };
        if (edge === "left") return { x: 0, y: size.y };
        if (edge === "bottom") return { x: size.x, y: size.y };
        return { x: size.x, y: 0 };
      }

      function buildBoundaryPath(startHit, endHit, size, clockwise) {
        const pts = [];
        let edge = startHit.edge;
        let guard = 0;
        while (edge !== endHit.edge && guard < 8) {
          pts.push(cornerAfter(edge, clockwise, size));
          edge = nextEdge(edge, clockwise);
          guard += 1;
        }
        pts.push(endHit.point);
        return pts;
      }

      function pointInPolygon(point, polygon) {
        let inside = false;
        for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
          const xi = polygon[i].x;
          const yi = polygon[i].y;
          const xj = polygon[j].x;
          const yj = polygon[j].y;
          const intersects = ((yi > point.y) !== (yj > point.y)) &&
            (point.x < ((xj - xi) * (point.y - yi)) / ((yj - yi) || 1e-9) + xi);
          if (intersects) inside = !inside;
        }
        return inside;
      }

      function renderHeadingIndicator(lat, lon, headingDeg) {
        if (!map) return;
        if (!headMarker) {
          headMarker = L.circleMarker([lat, lon], {
            radius: INDICATOR_RADIUS_PX,
            color: indicatorColor,
            weight: 1.5,
            fillColor: indicatorColor,
            fillOpacity: 0.15,
            opacity: 0.95,
          }).addTo(map);
        } else {
          headMarker.setLatLng([lat, lon]);
        }

        const centerPx = map.latLngToContainerPoint([lat, lon]);
        const size = map.getSize();
        const fovDeg = getHorizontalFovDeg();
        const halfFov = fovDeg * 0.5;
        const leftHeading = headingDeg - halfFov;
        const rightHeading = headingDeg + halfFov;
        const leftHit = getRayEdgeHit(centerPx, leftHeading, size);
        const rightHit = getRayEdgeHit(centerPx, rightHeading, size);
        const leftEnd = map.containerPointToLatLng(leftHit.point);
        const rightEnd = map.containerPointToLatLng(rightHit.point);

        if (!headingLeftRay) {
          headingLeftRay = L.polyline([[lat, lon], leftEnd], {
            color: indicatorColor,
            weight: 1.5,
            opacity: 0.95,
          }).addTo(map);
        } else {
          headingLeftRay.setLatLngs([[lat, lon], leftEnd]);
          headingLeftRay.setStyle({ color: indicatorColor, weight: 1.5, opacity: 0.95 });
        }

        if (!headingRightRay) {
          headingRightRay = L.polyline([[lat, lon], rightEnd], {
            color: indicatorColor,
            weight: 1.5,
            opacity: 0.95,
          }).addTo(map);
        } else {
          headingRightRay.setLatLngs([[lat, lon], rightEnd]);
          headingRightRay.setStyle({ color: indicatorColor, weight: 1.5, opacity: 0.95 });
        }

        const cwPath = buildBoundaryPath(leftHit, rightHit, size, true);
        const ccwPath = buildBoundaryPath(leftHit, rightHit, size, false);
        const forwardHit = getRayEdgeHit(centerPx, headingDeg, size);
        const testPoint = {
          x: centerPx.x + ((forwardHit.point.x - centerPx.x) * 0.75),
          y: centerPx.y + ((forwardHit.point.y - centerPx.y) * 0.75),
        };
        const cwPolyPx = [centerPx, leftHit.point].concat(cwPath);
        const ccwPolyPx = [centerPx, leftHit.point].concat(ccwPath);
        const fillPolyPx = pointInPolygon(testPoint, cwPolyPx) ? cwPolyPx : ccwPolyPx;
        const fillPolyLatLng = fillPolyPx.map((p) => map.containerPointToLatLng(p));

        if (!headingFovFill) {
          headingFovFill = L.polygon(fillPolyLatLng, {
            color: indicatorColor,
            weight: 0,
            opacity: 0,
            fillColor: indicatorColor,
            fillOpacity: 0.14,
          }).addTo(map);
        } else {
          headingFovFill.setLatLngs(fillPolyLatLng);
          headingFovFill.setStyle({
            color: indicatorColor,
            weight: 0,
            opacity: 0,
            fillColor: indicatorColor,
            fillOpacity: 0.14,
          });
        }
      }

      function projectHeading(lat, lon, headingDeg, lengthMeters) {
        const R = 6371000;
        const d = lengthMeters / R;
        const br = (headingDeg * Math.PI) / 180;
        const lat1 = (lat * Math.PI) / 180;
        const lon1 = (lon * Math.PI) / 180;
        const lat2 = Math.asin(Math.sin(lat1) * Math.cos(d) + Math.cos(lat1) * Math.sin(d) * Math.cos(br));
        const lon2 = lon1 + Math.atan2(Math.sin(br) * Math.sin(d) * Math.cos(lat1), Math.cos(d) - Math.sin(lat1) * Math.sin(lat2));
        return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
      }

      function apply() {
        const lat = getLat();
        const lon = getLon();
        const heading = getHeading();

        if (!map) return;
        map.setView([lat, lon], map.getZoom());

        renderHeadingIndicator(lat, lon, heading);

        updateCompass(heading);
        updateReadouts(heading, latestTiltDeg, latestRollDeg, "—", "—");
        updateTiltRollIndicator(latestTiltDeg, latestRollDeg);
        updateAxisInstruments(heading, 0, 0, 50, 50);
      }

      applyBtn.addEventListener("click", apply);

      function simPanTo360(deg180) {
        var d = Number(deg180);
        if (!Number.isFinite(d)) return 0;
        return ((d + 360) % 360 + 360) % 360;
      }

      function normalizeTileStyle(style) {
        var s = String(style || "").toLowerCase();
        return TILE_STYLE_ORDER.indexOf(s) >= 0 ? s : "dark";
      }

      function setMapStyleButtonLabel() {
        var btn = document.getElementById("mapStyleToggle");
        if (!btn) return;
        var txt = (tileStyle === "dark") ? "Dark" : (tileStyle === "mono" ? "Mono" : "Color");
        btn.textContent = "Map: " + txt;
      }

      function cycleMapStyle() {
        var idx = TILE_STYLE_ORDER.indexOf(tileStyle);
        if (idx < 0) idx = 0;
        var next = TILE_STYLE_ORDER[(idx + 1) % TILE_STYLE_ORDER.length];
        setMapStyle(next, true);
      }

      function setMapStyle(style, persist) {
        tileStyle = normalizeTileStyle(style);
        var baseProviders = (tileStyles[tileStyle] || tileStyles.color);
        // Keep dark mode visually stable; do not fall through to light/color providers.
        providers = (tileStyle === "dark") ? baseProviders.slice() : baseProviders.concat(osmFallbackProviders);
        tileProviderIndex = 0;
        setMapStyleButtonLabel();
        if (persist) {
          try { localStorage.setItem(TILE_STYLE_STORAGE_KEY, tileStyle); } catch (e) {}
        }
        activateTileProvider(0);
      }

      function setSimModeEnabled(on) {
        var enabled = !!on;
        var simModeEl = document.getElementById("simMode");
        var panelEl = document.getElementById("simPanel");
        if (simModeEl) simModeEl.checked = enabled;
        if (panelEl) panelEl.classList.toggle("visible", enabled);
        if (enabled) applySimToInstruments();
      }

      function applySimToInstruments() {
        var pan180 = parseInt(document.getElementById("simPan").value, 10) || 0;
        var tilt = parseInt(document.getElementById("simTilt").value, 10) || 0;
        var roll = parseInt(document.getElementById("simRoll").value, 10) || 0;
        var zoom = parseInt(document.getElementById("simZoom").value, 10) || 0;
        var focus = parseInt(document.getElementById("simFocus").value, 10) || 0;
        document.getElementById("valSimPan").textContent = pan180 + "°";
        document.getElementById("valSimTilt").textContent = tilt + "°";
        document.getElementById("valSimRoll").textContent = roll + "°";
        document.getElementById("valSimZoom").textContent = zoom + "°";
        document.getElementById("valSimFocus").textContent = focus + "%";
        var pan360 = simPanTo360(pan180);
        var zoomPct = Math.max(0, Math.min(100, (zoom + 180) / 360 * 100));
        indicatorZoomRatio = zoomPct / 100;
        latestTiltDeg = tilt;
        latestRollDeg = roll;
        updateReadouts(pan360, tilt, roll, zoom, focus);
        updateAxisInstruments(pan360, tilt, roll, zoomPct, focus);
        updateTiltRollIndicator(tilt, roll);
        updateCompass(pan360);
        if (map) {
          var lat = getLat(), lon = getLon();
          renderHeadingIndicator(lat, lon, pan360);
        }
      }

      function pollGamepadForSimMode() {
        var simModeEl = document.getElementById("simMode");
        if (!simModeEl || !simModeEl.checked) return;
        var pads = navigator.getGamepads ? navigator.getGamepads() : [];
        var gp = pads && pads[0];
        if (!gp || !gp.axes) return;
        var x = Number(gp.axes[0]);
        var y = Number(gp.axes[1]);
        var z = Number(gp.axes[2]);
        var zr = Number(gp.axes[5]);
        var xr = Number(gp.axes[3]);
        if (!Number.isFinite(x)) x = 0;
        if (!Number.isFinite(y)) y = 0;
        if (!Number.isFinite(z)) z = 0;
        if (!Number.isFinite(zr)) zr = 0;
        if (!Number.isFinite(xr)) xr = 0;
        var pan180 = Math.max(-180, Math.min(180, Math.round(x * 180)));
        var tilt180 = Math.max(-180, Math.min(180, Math.round(y * 180)));
        var roll180 = Math.max(-180, Math.min(180, Math.round(z * 180)));
        var zoom180 = Math.max(-180, Math.min(180, Math.round(zr * 180)));
        var focusPct = Math.max(0, Math.min(100, Math.round((xr + 1) * 50)));
        document.getElementById("simPan").value = String(pan180);
        document.getElementById("simTilt").value = String(tilt180);
        document.getElementById("simRoll").value = String(roll180);
        document.getElementById("simZoom").value = String(zoom180);
        document.getElementById("simFocus").value = String(focusPct);
        applySimToInstruments();
      }

      function gamepadSimLoop() {
        pollGamepadForSimMode();
        requestAnimationFrame(gamepadSimLoop);
      }

      document.getElementById("simMode").addEventListener("change", function () {
        setSimModeEnabled(this.checked);
      });

      ["simPan", "simTilt", "simRoll", "simZoom", "simFocus"].forEach(function (id) {
        document.getElementById(id).addEventListener("input", applySimToInstruments);
      });

      function decodeFastPacketV2(hex) {
        hex = (hex || "").replace(/\s/g, "");
        if (hex.length !== 38) return null;
        var bytes = [];
        for (var i = 0; i < 19; i++) {
          var b = parseInt(hex.substr(i * 2, 2), 16);
          if (isNaN(b)) return null;
          bytes.push(b);
        }
        if (bytes[0] !== 0xDE || bytes[1] !== 0xFD || bytes[2] !== 0x10) return null;
        var seq = bytes[3] | (bytes[4] << 8);
        var zoom = bytes[5] | (bytes[6] << 8); if (zoom >= 32768) zoom -= 65536;
        var focus = bytes[7] | (bytes[8] << 8);
        var iris = bytes[9] | (bytes[10] << 8);
        var yaw = bytes[11] | (bytes[12] << 8);
        var pitch = bytes[13] | (bytes[14] << 8);
        var roll = bytes[15] | (bytes[16] << 8);
        var pan180 = Math.max(-180, Math.min(180, Math.round((yaw - 32768) / 32768 * 180)));
        var tilt180 = Math.max(-180, Math.min(180, Math.round((pitch - 32768) / 32768 * 180)));
        var roll180 = Math.max(-180, Math.min(180, Math.round((roll - 32768) / 32768 * 180)));
        var zoom180 = Math.max(-180, Math.min(180, Math.round(zoom / 32767 * 180)));
        var focusPct = Math.max(0, Math.min(100, Math.round(focus / 65535 * 100)));
        return { seq: seq, pan180: pan180, tilt180: tilt180, roll180: roll180, zoom180: zoom180, focusPct: focusPct };
      }

      document.getElementById("decodePacket").addEventListener("click", function () {
        var hex = document.getElementById("fastPacketHex").value.trim();
        var decoded = decodeFastPacketV2(hex);
        if (!decoded) {
          alert("Invalid 19-byte fast packet. Use 38 hex chars (e.g. DE FD 10 ...).");
          return;
        }
        document.getElementById("simPan").value = decoded.pan180;
        document.getElementById("simTilt").value = decoded.tilt180;
        document.getElementById("simRoll").value = decoded.roll180;
        document.getElementById("simZoom").value = decoded.zoom180;
        document.getElementById("simFocus").value = decoded.focusPct;
        applySimToInstruments();
      });

      var simWs = null;
      function setWsStatus(txt) {
        var el = document.getElementById("wsStatus");
        if (el) el.textContent = txt;
        var btn = document.getElementById("wsConnect");
        if (btn) btn.textContent = (simWs && simWs.readyState === WebSocket.OPEN) ? "Disconnect" : "Connect";
      }
      function applyFastAxesToSim(axes) {
        if (!axes || typeof axes !== "object") return;
        var x = Number(axes.X);
        var y = Number(axes.Y);
        var z = Number(axes.Z);
        var zr = Number(axes.Zrotate);
        var xr = Number(axes.Xrotate);
        if (!Number.isFinite(x)) x = 0;
        if (!Number.isFinite(y)) y = 0;
        if (!Number.isFinite(z)) z = 0;
        if (!Number.isFinite(zr)) zr = 0;
        if (!Number.isFinite(xr)) xr = 0;
        var pan180 = Math.max(-180, Math.min(180, Math.round(x * 180)));
        var tilt180 = Math.max(-180, Math.min(180, Math.round(y * 180)));
        var roll180 = Math.max(-180, Math.min(180, Math.round(z * 180)));
        var zoom180 = Math.max(-180, Math.min(180, Math.round(zr * 180)));
        var focusPct = Math.max(0, Math.min(100, Math.round((xr + 1) * 50)));
        document.getElementById("simPan").value = pan180;
        document.getElementById("simTilt").value = tilt180;
        document.getElementById("simRoll").value = roll180;
        document.getElementById("simZoom").value = zoom180;
        document.getElementById("simFocus").value = focusPct;
        applySimToInstruments();
      }
      document.getElementById("wsConnect").addEventListener("click", function () {
        if (simWs && simWs.readyState === WebSocket.OPEN) {
          simWs.close();
          simWs = null;
          setWsStatus("Closed");
          return;
        }
        var url = document.getElementById("wsUrl").value.trim();
        if (!url) {
          var host = window.location.hostname || "localhost";
          url = (window.location.protocol === "https:" ? "wss:" : "ws:") + "//" + host + ":8766";
        }
        setWsStatus("Connecting…");
        try {
          simWs = new WebSocket(url);
          simWs.onopen = function () { setWsStatus("Live"); };
          simWs.onclose = function () { simWs = null; setWsStatus("Closed"); };
          simWs.onerror = function () { setWsStatus("Error"); };
          simWs.onmessage = function (ev) {
            try {
              var msg = JSON.parse(ev.data);
              if (msg && msg.type === "STATE" && msg.fast_axes) applyFastAxesToSim(msg.fast_axes);
            } catch (e) {}
          };
        } catch (e) {
          setWsStatus("Error: " + (e.message || e));
        }
      });

      document.getElementById("pasteLatLon").addEventListener("paste", function (e) {
        setTimeout(function () {
          const raw = document.getElementById("pasteLatLon").value.trim();
          const m = raw.match(/^(-?[\d.]+)\s*[,;\s]\s*(-?[\d.]+)\s*$/);
          if (m) {
            document.getElementById("lat").value = m[1];
            document.getElementById("lon").value = m[2];
            document.getElementById("pasteLatLon").value = "";
          }
        }, 0);
      });
      document.getElementById("pasteLatLon").addEventListener("change", function () {
        const raw = this.value.trim();
        const m = raw.match(/^(-?[\d.]+)\s*[,;\s]\s*(-?[\d.]+)\s*$/);
        if (m) {
          document.getElementById("lat").value = m[1];
          document.getElementById("lon").value = m[2];
          this.value = "";
        }
      });

      window.addEventListener("message", function (ev) {
        try {
          var msg = ev && ev.data;
          if (!msg || msg.type !== "POSITION_DISPLAY_UPDATE") return;
          var lat = Number(msg.lat);
          var lon = Number(msg.lon);
          var heading = Number(msg.heading);
          var tilt = Number(msg.tilt);
          var roll = Number(msg.roll);
          var zoomNorm = Number(msg.zoom_norm);
          var simMode = msg.sim_mode;
          var mapStyle = msg.map_style;
          if (!Number.isFinite(lat) || !Number.isFinite(lon) || !Number.isFinite(heading)) return;
          document.getElementById("lat").value = String(lat);
          document.getElementById("lon").value = String(lon);
          document.getElementById("heading").value = String(((heading % 360) + 360) % 360);
          if (Number.isFinite(tilt)) latestTiltDeg = tilt;
          if (Number.isFinite(roll)) latestRollDeg = roll;
          if (Number.isFinite(zoomNorm)) indicatorZoomRatio = Math.max(0, Math.min(1, zoomNorm));
          if (typeof simMode === "boolean") setSimModeEnabled(simMode);
          if (typeof mapStyle === "string") setMapStyle(mapStyle, false);
          apply();
        } catch (e) {}
      });

      map = L.map("map", { zoomControl: true }).setView([defaultLat, defaultLon], 16);
      var mapStyleToggleBtn = document.getElementById("mapStyleToggle");
      if (mapStyleToggleBtn) mapStyleToggleBtn.addEventListener("click", cycleMapStyle);
      var styleFromQuery = normalizeTileStyle(qs.get("mapStyle"));
      setMapStyle(qs.has("mapStyle") ? styleFromQuery : "dark", false);
      function activateTileProvider(index) {
        if (!map) return;
        if (index >= providers.length) {
          setTileStatus("No map tiles (network/CDN blocked on Pi).", true);
          return;
        }
        tileProviderIndex = index;
        if (tileLayer) {
          try { map.removeLayer(tileLayer); } catch (e) {}
          tileLayer = null;
        }
        var p = providers[index];
        var loadedAny = false;
        var errorCount = 0;
        setTileStatus("Loading map tiles...", true);
        tileLayer = L.tileLayer(p.url, {
          attribution: p.attribution,
          maxZoom: 19,
          crossOrigin: true,
        });
        tileLayer.on("tileload", function () {
          loadedAny = true;
          setTileStatus("", false);
        });
        tileLayer.on("tileerror", function () {
          errorCount += 1;
          if (!loadedAny && errorCount >= 4) activateTileProvider(index + 1);
        });
        tileLayer.addTo(map);
        setTimeout(function () {
          if (!loadedAny && tileProviderIndex === index) activateTileProvider(index + 1);
        }, 3500);
      }
      activateTileProvider(0);
      map.attributionControl.setPrefix("");
      if (minimalMode && map.attributionControl && map.attributionControl.setPosition) {
        map.attributionControl.setPosition("topright");
      }
      L.control.scale({ position: "bottomright", metric: true, imperial: false, maxWidth: 120 }).addTo(map);
      map.on("zoomend", apply);

      latInput.value = String(defaultLat);
      lonInput.value = String(defaultLon);
      headingInput.value = String(defaultHeading);
      setSimModeEnabled(false);
      apply();
      requestAnimationFrame(gamepadSimLoop);
    })();
  </script>
</body>
</html>
